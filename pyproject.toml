[project]
name = "svgizer"
version = "0.1.0"
description = "Iterative SVG refinement using OpenAI multimodal models"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
  "openai>=1.0.0",
  "cairosvg>=2.7.0",
  "pillow>=10.0.0",
  "numpy>=2.2.6",
  "torch>=2.0.0",
  "torchvision>=0.15.0",
  "lpips>=0.1.4",
]

[project.scripts]
svgizer = "svgizer.main:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]